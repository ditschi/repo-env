name: PR
on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true
permissions:
  contents: read
  pull-requests: read
jobs:
  # ── 1. Conventional Commits PR-title lint (primary gate for squash merges) ──
  lint-title:
    name: Lint PR title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed types mirror pyproject.toml commitizen config
          types: |
            feat
            fix
            docs
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^[a-z].+[^.]$
          subjectPatternError: |
            Subject must start lowercase and not end with a period.
  # ── 2. Code quality (Python 3.12 only) ──────────────────────────────────────
  quality:
    name: Quality gates (3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - name: Install nox
        run: uv tool install nox
      - name: Syntax check
        run: nox -s check_syntax
      - name: Lint
        run: nox -s lint
      - name: Type check
        run: nox -s check_types
      - name: Import analysis
        run: nox -s necessary_imports
      - name: Dead code
        run: nox -s dead_code
      - name: Duplicate code
        run: nox -s duplicates
      - name: Cyclic imports
        run: nox -s cyclic_imports
  # ── 3. Tests — multi-Python matrix ──────────────────────────────────────────
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - uses: astral-sh/setup-uv@v4
      - name: Install nox
        run: uv tool install nox
      - name: Unit tests
        run: nox -s tests-${{ matrix.python-version }}
  # ── 4. Docs build (strict) ───────────────────────────────────────────────────
  docs-build:
    name: Docs build (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # mike needs the full history to list existing versions
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - name: Install nox
        run: uv tool install nox
      - name: Build docs
        run: nox -s docs
  # ── 5. Docs preview (only when docs files changed) ──────────────────────────
  docs-preview:
    name: Docs preview
    runs-on: ubuntu-latest
    needs: docs-build
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - name: Install docs deps
        run: uv pip install -e ".[docs]" --system
      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Check if docs changed
        id: docs-changed
        uses: tj-actions/changed-files@v47
        with:
          files: |
            docs/**
            mkdocs.yml
            src/repoenv/**/*.py
      - name: Build docs for preview
        if: steps.docs-changed.outputs.any_changed == 'true'
        run: mkdocs build --strict --site-dir site
      - name: Deploy docs preview
        if: steps.docs-changed.outputs.any_changed == 'true'
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: site
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
