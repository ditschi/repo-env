name: Main

on:
  push:
    branches: [main]

concurrency:
  group: main-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── 1. Full quality gates ────────────────────────────────────────────────────
  quality:
    name: Quality gates (3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - name: Install nox
        run: uv tool install nox

      - name: Run all quality gates
        run: nox --no-error-on-missing-interpreters

  # ── 2. Tests — multi-Python matrix ──────────────────────────────────────────
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - uses: astral-sh/setup-uv@v4

      - name: Install nox
        run: uv tool install nox

      - name: Unit tests
        run: nox -s tests-${{ matrix.python-version }}

  # ── 3. Integration tests (single Python — see quality-gates.md) ──────────────
  integration:
    name: Integration tests (3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - name: Install nox
        run: uv tool install nox

      - name: Integration tests
        run: nox -s integration

  # ── 4. Deploy docs `latest` to GitHub Pages ─────────────────────────────────
  docs-deploy:
    name: Deploy docs (latest)
    runs-on: ubuntu-latest
    needs: [quality, tests, integration]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - name: Install docs deps
        run: uv pip install -e ".[docs]" --system

      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy latest docs
        run: |
          mike deploy --push --update-aliases latest
          mike set-default --push latest
