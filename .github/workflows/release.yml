name: Release
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"
permissions:
  contents: write # create GitHub Release
  id-token: write # OIDC Trusted Publishing (PyPI + TestPyPI)
jobs:
  # ── 1. Build sdist + wheel ───────────────────────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # hatch-vcs needs full history
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - name: Install hatch
        run: uv tool install hatch
      - name: Build
        run: hatch build
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
  # ── 2. Publish to TestPyPI (dry-run gate) ───────────────────────────────────
  publish-test:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: testpypi
      url: https://test.pypi.org/p/repo-env
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          print-hash: true
          verbose: true
      - name: Verify install from TestPyPI
        run: |
          uv tool install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            "repo-env==${{ needs.build.outputs.version }}"
          renv --version
  # ── 3. Publish to PyPI (production) ─────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, publish-test]
    environment:
      name: pypi
      url: https://pypi.org/p/repo-env
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
  # ── 4. Create GitHub Release ─────────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, publish-pypi]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - name: Install commitizen
        run: uv tool install commitizen
      - name: Extract changelog for this version
        run: |
          cz changelog --dry-run "${{ needs.build.outputs.version }}" > /tmp/release-notes.md || \
          echo "Release ${{ needs.build.outputs.version }}" > /tmp/release-notes.md
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          files: dist/*
          fail_on_unmatched_files: true
  # ── 5. Deploy versioned docs ─────────────────────────────────────────────────
  docs-deploy:
    name: Deploy versioned docs
    runs-on: ubuntu-latest
    needs: [build, github-release]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v4
      - name: Install docs deps
        run: uv pip install -e ".[docs]" --system
      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Deploy versioned docs
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          mike deploy --push --update-aliases "$VERSION" stable
          mike set-default --push stable
