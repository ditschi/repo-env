version: 2
updates:
  # Python dependencies
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    # Emit Conventional-Commit titles (e.g. "build(deps): bump X") so the
    # PR-title lint (amannn/action-semantic-pull-request) accepts them.
    commit-message:
      prefix: "build"
      include: "scope"
    groups:
      dev-tools:
        patterns: ["nox", "pytest*", "ruff", "black", "mypy", "isort", "flake8*", "pylint", "vulture", "fawltydeps", "commitizen"]
      docs:
        patterns: ["mkdocs*", "mike"]
      runtime:
        update-types: ["minor", "patch"]
        patterns: ["typer", "rich", "questionary", "pydantic", "ruamel.yaml", "platformdirs", "filelock"]
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build"
      include: "scope"
    groups:
      github-actions:
        patterns: ["*"]
