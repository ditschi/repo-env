version: 2
updates:
  # Python dependencies
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      dev-tools:
        patterns: ["nox", "pytest*", "ruff", "black", "mypy", "isort", "flake8*", "pylint", "vulture", "fawltydeps", "commitizen"]
      docs:
        patterns: ["mkdocs*", "mike"]
      runtime:
        update-types: ["minor", "patch"]
        patterns: ["typer", "rich", "questionary", "pydantic", "ruamel.yaml", "platformdirs", "filelock"]
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
